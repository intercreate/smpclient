name: Test Docs Build
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v6

      - name: Build docs
        run: |
          uv run --group doc python docs/_generate_requests_docstrings.py
          uv run --group doc mkdocs build

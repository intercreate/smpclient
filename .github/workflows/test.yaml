name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint-and-test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest, ubuntu-24.04-arm]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v8.1.0

      - run: uv run --python ${{ matrix.python-version }} camas

      - run: uv build

      - uses: actions/upload-artifact@v7
        with:
          name: dist-${{ matrix.os }}-${{ matrix.python-version }}
          path: |
            dist/*.tar.gz
            dist/*.whl

  transport-extras:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: no-extras
            extras: ""
            expect-serial: fail
            expect-ble: fail
            expect-bumble: fail
            expect-hci-firmware: fail
          - name: serial-only
            extras: "[serial]"
            expect-serial: pass
            expect-ble: fail
            expect-bumble: fail
            expect-hci-firmware: fail
          - name: ble-only
            extras: "[ble]"
            expect-serial: fail
            expect-ble: pass
            expect-bumble: fail
            expect-hci-firmware: fail
          - name: bumble-only
            extras: "[bumble]"
            # bumble depends on pyserial-asyncio, which transitively installs
            # pyserial — so the serial transport import happens to succeed too.
            expect-serial: pass
            expect-ble: fail
            expect-bumble: pass
            expect-hci-firmware: fail
          - name: hci-firmware-only
            extras: "[hci_firmware]"
            expect-serial: fail
            expect-ble: fail
            expect-bumble: fail
            expect-hci-firmware: pass
          - name: all
            extras: "[all]"
            expect-serial: pass
            expect-ble: pass
            expect-bumble: pass
            expect-hci-firmware: pass
    name: transport-extras (${{ matrix.name }})
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v8.1.0

      - run: uv venv && uv pip install .${{ matrix.extras }}

      - name: serial transport should ${{ matrix.expect-serial }}
        run: |
          if [ "${{ matrix.expect-serial }}" = "pass" ]; then
            .venv/bin/python -c "from smpclient.transport.serial import SMPSerialTransport"
          else
            ! .venv/bin/python -c "from smpclient.transport.serial import SMPSerialTransport" 2>/dev/null
          fi

      - name: ble transport should ${{ matrix.expect-ble }}
        run: |
          if [ "${{ matrix.expect-ble }}" = "pass" ]; then
            .venv/bin/python -c "from smpclient.transport.ble import SMPBLETransport"
          else
            ! .venv/bin/python -c "from smpclient.transport.ble import SMPBLETransport" 2>/dev/null
          fi

      - name: bumble transport should ${{ matrix.expect-bumble }}
        run: |
          if [ "${{ matrix.expect-bumble }}" = "pass" ]; then
            .venv/bin/python -c "from smpclient.transport.bumble import SMPBumbleTransport"
          else
            ! .venv/bin/python -c "from smpclient.transport.bumble import SMPBumbleTransport" 2>/dev/null
          fi

      - name: hci firmware should ${{ matrix.expect-hci-firmware }}
        run: |
          if [ "${{ matrix.expect-hci-firmware }}" = "pass" ]; then
            .venv/bin/python -c "from smpclient.transport.firmware.hci import firmware; assert firmware.nrf52840dk_default.HEX_PATH.is_file()"
          else
            ! .venv/bin/python -c "from smpclient.transport.firmware.hci import firmware" 2>/dev/null
          fi

      - name: udp transport should pass
        run: .venv/bin/python -c "from smpclient.transport.udp import SMPUDPTransport"

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.1.0

      - run: uv run camas coverage

  integration:
    name: integration (native_sim + qemu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v8.1.0

      - run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends qemu-system-arm libc6:i386

      - run: uv run camas test-integration

      - name: Upload integration test logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          path: integration-tests.log
          archive: false
          if-no-files-found: warn
